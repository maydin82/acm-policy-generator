apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: open-cluster-management
resources:
  - cluster-ns.yaml
  - pull-secret.yaml
  - threenodecluster.yaml
  - bmc-secret.yaml
generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: hcp-cluster-templates-custom
    files:
    - KlusterletAddonConfig=KlusterletAddonConfig.yaml
  

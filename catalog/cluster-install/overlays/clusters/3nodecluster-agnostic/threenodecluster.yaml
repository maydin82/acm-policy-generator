apiVersion: siteconfig.open-cluster-management.io/v1alpha1
kind: ClusterInstance
metadata:
  name: "example-ai-3node"
  namespace: "example-ai-3node"
spec:
  platformType: None
  baseDomain: "example.com"
  pullSecretRef:
    name: "assisted-deployment-pull-secret"
  clusterImageSetNameRef: "img4.21.6-x86-64-appsub"
  sshPublicKey: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIEsCJw3L/J5C82Fge6lnHU7kTDXKZy8Z5e6iqoHzvJ7p maydin@maydin-mac"
  clusterName: "example-ai-3node"
  clusterType: HighlyAvailable  
  networkType: "OVNKubernetes"
  # Include references to extraManifest ConfigMaps.
#  extraManifestsRefs:
#    - name: sno-extra-manifest-configmap
  extraLabels:
    ManagedCluster:
      du-profile: "latest"
      sites : "example-multinode"
  machineNetwork:
    - cidr: 192.168.1.0/24
  serviceNetwork:
    - cidr: 100.70.0.0/16
  clusterNetwork:
    - cidr: 10.128.0.0/14
      hostPrefix: 23
  apiVIPs:
    - 192.168.1.2
  ingressVIPs:
    - "192.168.1.3"
  additionalNTPSources:
    - 5.5.5.5
  templateRefs:
    - name: ai-cluster-templates-v1
      namespace: open-cluster-management 
    - name: ai-cluster-templates-klusterletaddon
      namespace: open-cluster-management
  nodes:
      templateRefs:
        - name: ai-node-templates-v1
          namespace: open-cluster-management


apiVersion: policy.open-cluster-management.io/v1
kind: PolicyGenerator
metadata:
  name: policy-catalog-generator
placementBindingDefaults:
  name: catalog-config-binding 
policyDefaults:
  categories:
    - CM Configuration Management
  controls: 
    - CM-2 Baseline Configuration
  namespace: acm-policies
  metadataComplianceType: "musthave"
  complianceType: "mustonlyhave"
  remediationAction: enforce
  severity: medium
  standards:
    - NIST SP 800-53
policies:



- name: sealed-secrets
  disabled: false
  manifests:
    - path: ./sealed-secrets/overlays/default
  policySets:
    - policyset-hub-catalog


policySets:
  - description: Catalog policies  applied to hub cluster
    name: policyset-hub-catalog
    placement:
      placementName: placement-hub


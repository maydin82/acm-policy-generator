apiVersion: ocs.openshift.io/v1
kind: StorageCluster
metadata:
  name: ocs-storagecluster
  namespace: openshift-storage
spec:
  flexibleScaling: true
  storageDeviceSets:
  - count: '{{hub default "3" (lookup "v1" "ConfigMap" "acm-policies" .ManagedClusterName).data.odfcountsize |toInt hub}}' 
    dataPVCTemplate:
      spec:
        accessModes:
        - ReadWriteOnce
        resources:
          requests:
            storage: "2Ti"
        storageClassName: thin
        volumeMode: Block
    name: ocs-deviceset
    portable: true
    replica: 1  # <-- dont touch this  


